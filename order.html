<!DOCTYPE html>
<html>
<head>
<title>Order Form</title>

<style>
body {
    font-family: Arial;
    background: #f4f4f4;
}

/* Home Button */
.home-btn {
    display: block;
    width: 100px;
    margin: 20px auto;
    text-align: center;
    background: #2e7d32;
    color: white;
    padding: 10px;
    text-decoration: none;
    border-radius: 5px;
}

/* Form */
.form-container {
    width: 400px;
    margin: auto;
    background: white;
    padding: 20px;
    margin-top: 20px;
    border-radius: 10px;
}

input, select, textarea {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
}

button {
    background: green;
    color: white;
    padding: 10px;
    border: none;
}
</style>

</head>

<body>

<!-- HOME LINK -->
<a href="index.html" class="home-btn">🏠 Home</a>

<div class="form-container">
    <h2>Order Now</h2>

    <form onsubmit="return submitForm()">

        <input type="text" placeholder="Full Name" required>

        <input type="tel" placeholder="Mobile Number" required>

        <select required>
            <option value="">Select Product</option>
            <option>Cultivator</option>
            <option>Rotavator</option>
            <option>Seed Driller</option>
            <option>Trolley</option>
            <option>Planter</option>
            <option>Water Pump</option>
            <option>Sprinkler System</option>
            <option>Water Tanker</option>
            <option>Milking Machine</option>
        </select>

        <input type="number" placeholder="Quantity" required>

        <textarea placeholder="Address" required></textarea>

        <button type="submit">Place Order</button>

    </form>
</div>

<script>
function submitForm() {
    alert("Order placed successfully!");
    return false;
}
</script>

</body>
</html>
